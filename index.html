<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Layout Esteira</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- <link rel="stylesheet" href="css/style.css"> -->
<link rel="stylesheet" href="css/esteira.css">

</head>

<body>

<div class="topo p-2">
  <button id="btnAddMesa" class="btn btn-primary">+ Mesa</button>
</div>

<div class="container-fluid">

  <div class="row">

    <!-- FANOUTS -->
    <div class="col-md-3">
      <div class="fanouts p-2">
        <h4>Fan-outs</h4>

        <input
          type="text"
          id="fanoutInput"
          class="form-control mb-2"
          placeholder="Digite fan-out"
        />

        <div id="listaFanouts"></div>
      </div>
    </div>


    <!-- LAYOUT -->
    <div class="col-md-9">

      <div class="layout">

        <!-- ESQUERDA -->
        <div class="coluna">
          <h5 class="text-center">Esquerda</h5>
          <div id="mesasEsquerda"></div>
        </div>

        <!-- ESTEIRA -->
        <div class="esteira d-flex flex-column align-items-center justify-content-start">
          <div class="seta">↓</div>
          <div class="seta">↓</div>
          <div class="seta">↓</div>
          <div class="seta">↓</div>
          <div class="seta">↓</div>
          <div class="seta">↓</div>
        </div>

        <!-- DIREITA -->
        <div class="coluna">
          <h5 class="text-center">Direita</h5>
          <div id="mesasDireita"></div>
        </div>

      </div>

    </div>

  </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>

</body>
</html>
