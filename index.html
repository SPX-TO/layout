<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Layout Esteira</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>



<div class="container-fluid mt-2">

  <!-- BOTÕES -->
  <div class="mb-2">
    <button id="btnAddMesa" class="btn btn-primary btn-sm">+ Mesa</button>
    <button class="btn btn-success btn-sm">Salvar Layout</button>
    <button class="btn btn-secondary btn-sm">Carregar Layout</button>
    <button id="btnNovo" class="btn btn-warning btn-sm">Novo Layout</button>
  </div>

  <div class="row">

    <!-- COLUNA ESQUERDA -->
    <div class="col-md-3">

      <!-- FANOUT -->
      <div class="bloco" id="blocoFanout">

        <div class="fw-bold box-title">Fan-outs</div>

        <input id="fanoutInput" class="form-control mt-2 mb-2" placeholder="Buscar fan-out">

        <div id="listaFanoutsBusca"></div>

        <hr>

        <small class="text-muted">Selecionados</small>

        <div id="listaFanoutsSelecionados"></div>

      </div>

      <!-- OPERADORES -->
      <div class="bloco" id="blocoOperadores">

        <div class="fw-bold box-title">Operadores</div>

        <input id="buscaOperador" class="form-control mt-2 mb-2" placeholder="Buscar operador">

        <div id="listaOperadoresBusca"></div>

        <hr>

        <!-- FUNÇÕES -->
        <div class="grupo-funcao">
          <strong>Indução</strong>
          <div class="drop-funcao" data-funcao="inducao"></div>
        </div>

        <div class="grupo-funcao">
          <strong>Lateral Esquerda</strong>
          <div class="drop-funcao" data-funcao="lateral_e"></div>
        </div>

        <div class="grupo-funcao">
          <strong>Lateral Direita</strong>
          <div class="drop-funcao" data-funcao="lateral_d"></div>
        </div>

        <div class="grupo-funcao">
          <strong>Pesca Esquerda</strong>
          <div class="drop-funcao" data-funcao="pesca_e"></div>
        </div>

        <div class="grupo-funcao">
          <strong>Pesca Direita</strong>
          <div class="drop-funcao" data-funcao="pesca_d"></div>
        </div>

        <div class="grupo-funcao">
          <strong>Bipe Esquerda</strong>
          <div class="drop-funcao" data-funcao="bipe_e"></div>
        </div>

        <div class="grupo-funcao">
          <strong>Bipe Direita</strong>
          <div class="drop-funcao" data-funcao="bipe_d"></div>
        </div>

        <div class="grupo-funcao">
          <strong>Gol</strong>
          <div class="drop-funcao" data-funcao="gol"></div>
        </div>

      </div>

    </div>

    <!-- CENTRO -->
    <div class="col-md-9">

      <!-- TÍTULO -->
      <div class="titulo-layout">
        Layout da esteira
      </div>

      <div class="d-flex justify-content-between mb-2">
        <div>ESQUERDA</div>
        <div>DIREITA</div>
      </div>

      <div id="containerMesas"></div>

    </div>

  </div>

</div>

<!-- FOOTER -->
<footer id="footerSistema">

  <div class="footer-left">
    Gestão de esteiras - Luciano Bento
  </div>

  <div class="footer-center">
    Esteira: Java | Turno: T3
  </div>

  <div class="footer-right">
    Fale comigo
  </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>

</body>
</html>
