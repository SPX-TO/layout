<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Layout Esteira</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
 
</head>

<body> 
 
<div class="topo"> 
  <button id="btnAddMesa" class="btn btn-primary">+ Mesa</button>
</div>   
 
<div class="container">
  
   <div class="fanouts">
    <h3>Fan-outs</h3>
    <input id="fanoutInput" placeholder="Digite fan-out">
    <div id="listaFanouts"></div>
  </div>

  <div class="layout">

    <div class="lado">
      <h4>Esquerda</h4>
      <div id="mesasEsquerda"></div>
    </div>

    <div class="esteira">
      ↓↓↓↓↓↓↓
    </div>

    <div class="lado">
      <h4>Direita</h4>
      <div id="mesasDireita"></div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>

</body>
</html>
