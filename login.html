  <title>Login - TO Shopee</title>

  <link rel="stylesheet" href="css/style.css" />

<body>

 <div class="login-container">
  <div class="login-card">
    <h2>Login</h2>

    <form id="loginForm">

      <input 
        type="email" 
        id="email" 
        class="login-input"
        placeholder="Email" 
        required 
      />

      <input 
        type="password" 
        id="password" 
        class="login-input"
        placeholder="Senha" 
        required 
      />

      <button type="submit" class="login-btn">
        Entrar
      </button>

    </form>

    <p id="loginMessage"></p>

  </div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/login.js"></script>

</body>
