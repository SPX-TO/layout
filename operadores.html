<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro de Operadores</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/esteira.css">
</head>

<body>

<div class="container mt-4">

<div class="card shadow-sm">
<div class="card-body">

<h4 class="mb-3">Operadores</h4>

<input type="hidden" id="operadorId">

<div class="row g-2 mb-3">

<div class="col-md-3">
<input type="text" id="nomeOperador" class="form-control" placeholder="Nome">
</div>

<div class="col-md-3">
<input type="text" id="sobrenomeOperador" class="form-control" placeholder="Sobrenome">
</div>

<div class="col-md-2">
<select id="funcaoOperador" class="form-select">
<option value="inducao">Indução</option>
<option value="pesca">Pesca</option>
<option value="bipe">Bipe</option>
<option value="lateral">Lateral</option>
<option value="gol">Gol</option>
</select>
</div>

<div class="col-md-2">
<input type="text" id="opsOperador" class="form-control" placeholder="OPS">
</div>

<div class="col-md-1">
<button id="btnSalvarOperador" class="btn btn-primary w-100">
<i class="bi bi-save"></i>
</button>
</div>

<div class="col-md-1">
<button id="btnLimpar" class="btn btn-secondary w-100">
<i class="bi bi-x-circle"></i>
</button>
</div>

</div>

<hr>

<div class="list-group" id="listaOperadores"></div>

</div>
</div>

</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/operadores.js" defer></script>

</body>
</html>
